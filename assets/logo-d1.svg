<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 129 49" fill="none">
  <defs>
    <style>
      .d1-turtle { transform-box: fill-box; transform-origin: center bottom; animation: d1-crawl 6s ease-in-out infinite; }
      @keyframes d1-crawl { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(5px); } }
      @media (prefers-reduced-motion: reduce) { .d1-turtle { animation: none; } }
    </style>
  </defs>
  <!-- sun + millae wordmark, exactly as designed (turtle removed) -->
  <image href="data:image/png;base64," x="0" y="0" width="129" height="49"/>
  <!-- turtle, redrawn so it can crawl -->
  <g class="d1-turtle">
    <path d="M95.0 48.0 A15.5 19.0 0 0 1 126.0 48.0 Z" fill="#326d45"/>
    <ellipse cx="105.1" cy="37.5" rx="1.7" ry="2.1" fill="#eaf3ec"/>
  </g>
</svg>